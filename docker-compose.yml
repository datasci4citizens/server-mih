services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env-model
    environment:
      POSTGRES_URL: postgresql://postgres:postgres@db:5432/postgres
      MINIO_DOMAIN: minio:9000
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5431:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: miniodev
      MINIO_ROOT_PASSWORD: miniodev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
